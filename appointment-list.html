<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>預約清單</title>
  <style>body{font-family:Arial;margin:24px} table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px}</style>
</head>
<body>
  <h1>預約清單</h1>
  <p>日期：<input id="date" type="date" /> <button id="load">載入</button></p>
  <table>
    <thead><tr><th>appointment_id</th><th>client_id</th><th>date</th><th>status</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <p><a href="index.html">回首頁</a></p>
  <script>
    document.getElementById('load').addEventListener('click', ()=>{
      document.getElementById('tbody').innerHTML = '<tr><td colspan="4">請接 AppointmentService.listByDate()</td></tr>';
    });
  </script>
</body>
</html>
